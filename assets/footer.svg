<svg width="1200" height="180" viewBox="0 0 1200 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fBorder" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="fBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0A14"/>
      <stop offset="50%" stop-color="#131030"/>
      <stop offset="100%" stop-color="#0B0A14"/>
    </linearGradient>
    <pattern id="fgrid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#2A2454" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <rect x="2" y="2" width="1196" height="176" rx="22" fill="url(#fBg)" stroke="url(#fBorder)" stroke-width="2.5"/>
  <rect x="2" y="2" width="1196" height="176" rx="22" fill="url(#fgrid)"/>

  <circle cx="120" cy="50" r="2" fill="#C4B5FD">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1080" cy="130" r="2.4" fill="#818CF8">
    <animate attributeName="opacity" values="1;0.2;1" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="900" cy="42" r="1.8" fill="#A78BFA">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.6s" repeatCount="indefinite"/>
  </circle>

  <text x="600" y="78" font-family="Arial, sans-serif" font-weight="800" font-size="24" fill="#FFFFFF" text-anchor="middle">Good pipelines are invisible — <tspan fill="#A78BFA">they just run.</tspan></text>

  <text x="600" y="118" font-family="'Courier New', monospace" font-weight="600" font-size="15" fill="#8783A8" text-anchor="middle">priyanshupandita@gmail.com  ·  Pune, India  ·  open to Data Engineering roles</text>

  <rect x="470" y="136" width="260" height="4" rx="2" fill="url(#fBorder)">
    <animate attributeName="width" values="0;260" dur="1.6s" fill="freeze"/>
    <animate attributeName="x" values="600;470" dur="1.6s" fill="freeze"/>
  </rect>
</svg>
