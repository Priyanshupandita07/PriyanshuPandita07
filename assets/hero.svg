<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0A14"/>
      <stop offset="60%" stop-color="#12102A"/>
      <stop offset="100%" stop-color="#0B0A14"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#C4B5FD"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#D8B4FE"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#2A2454" stroke-width="0.5" opacity="0.35"/>
    </pattern>
  </defs>

  <rect x="2" y="2" width="1196" height="416" rx="22" fill="url(#bgGrad)" stroke="url(#borderGrad)" stroke-width="2.5"/>
  <rect x="2" y="2" width="1196" height="416" rx="22" fill="url(#grid)"/>

  <path d="M 60 90 Q 400 20 820 70" stroke="#6D28D9" stroke-width="1.2" fill="none" opacity="0.55">
    <animate attributeName="d"
      values="M 60 90 Q 400 20 820 70; M 60 80 Q 400 45 820 55; M 60 90 Q 400 20 820 70"
      dur="7s" repeatCount="indefinite"/>
  </path>
  <path d="M 120 380 Q 600 340 1140 385" stroke="#8B5CF6" stroke-width="1" fill="none" opacity="0.35">
    <animate attributeName="d"
      values="M 120 380 Q 600 340 1140 385; M 120 372 Q 600 360 1140 375; M 120 380 Q 600 340 1140 385"
      dur="9s" repeatCount="indefinite"/>
  </path>

  <circle cx="1050" cy="60" r="2.5" fill="#C4B5FD">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="340" r="2" fill="#818CF8">
    <animate attributeName="opacity" values="1;0.15;1" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="640" cy="45" r="1.8" fill="#A78BFA">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.8s" repeatCount="indefinite"/>
  </circle>

  <rect x="56" y="52" width="330" height="34" rx="17" fill="#151230" stroke="#4C1D95" stroke-width="1"/>
  <circle cx="78" cy="69" r="5" fill="#8B5CF6">
    <animate attributeName="opacity" values="1;0.35;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <text x="94" y="74" font-family="'Courier New', monospace" font-weight="700" font-size="14" fill="#A78BFA" letter-spacing="2.5">DATA ENGINEERING / GCP</text>

  <text x="56" y="165" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="64" fill="url(#nameGrad)" letter-spacing="1">PRIYANSHU</text>
  <text x="56" y="230" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="64" fill="url(#nameGrad)" letter-spacing="1">PANDITA</text>

  <rect x="58" y="248" width="360" height="4" rx="2" fill="url(#bar2)">
    <animate attributeName="width" values="0;360" dur="1.4s" fill="freeze"/>
  </rect>

  <text x="56" y="288" font-family="Arial, sans-serif" font-weight="800" font-size="23" fill="#FFFFFF">Pipelines by design. <tspan fill="#A78BFA">Production by proof.</tspan></text>

  <text x="56" y="322" font-family="'Courier New', monospace" font-size="15" fill="#8783A8" font-weight="600">B.Tech ECE — MIT WPU, June 2026 | Pune, India</text>

  <rect x="56" y="344" width="560" height="46" rx="12" fill="#100E24" stroke="#3B3470" stroke-width="1"/>
  <text x="76" y="373" font-family="'Courier New', monospace" font-weight="700" font-size="15" fill="#8B5CF6">&gt; building:</text>
  <text x="196" y="373" font-family="'Courier New', monospace" font-weight="600" font-size="15" fill="#D6D3EE">ETL pipelines that run while I sleep<tspan fill="#8B5CF6">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>_</tspan></text>

  <rect x="820" y="72" width="320" height="278" rx="16" fill="#0E0C20" stroke="#3B3470" stroke-width="1.2"/>
  <rect x="844" y="94" width="272" height="34" rx="17" fill="#151230" stroke="#4C1D95" stroke-width="1"/>
  <text x="980" y="116" font-family="'Courier New', monospace" font-weight="700" font-size="14" fill="#C4B5FD" letter-spacing="2.5" text-anchor="middle">ENGINEERING PROFILE</text>

  <text x="844" y="160" font-family="'Courier New', monospace" font-weight="700" font-size="13" fill="#D6D3EE" letter-spacing="1.5">SQL &amp; BIGQUERY</text>
  <rect x="844" y="170" width="272" height="7" rx="3.5" fill="#1D1A3A"/>
  <rect x="844" y="170" width="0" height="7" rx="3.5" fill="url(#bar1)">
    <animate attributeName="width" values="0;238" dur="1.6s" fill="freeze"/>
  </rect>

  <text x="844" y="207" font-family="'Courier New', monospace" font-weight="700" font-size="13" fill="#D6D3EE" letter-spacing="1.5">PYTHON ETL</text>
  <rect x="844" y="217" width="272" height="7" rx="3.5" fill="#1D1A3A"/>
  <rect x="844" y="217" width="0" height="7" rx="3.5" fill="url(#bar2)">
    <animate attributeName="width" values="0;224" dur="1.9s" fill="freeze"/>
  </rect>

  <text x="844" y="254" font-family="'Courier New', monospace" font-weight="700" font-size="13" fill="#D6D3EE" letter-spacing="1.5">PYSPARK / DATAPROC</text>
  <rect x="844" y="264" width="272" height="7" rx="3.5" fill="#1D1A3A"/>
  <rect x="844" y="264" width="0" height="7" rx="3.5" fill="url(#bar3)">
    <animate attributeName="width" values="0;204" dur="2.2s" fill="freeze"/>
  </rect>

  <rect x="844" y="296" width="86" height="32" rx="16" fill="none" stroke="#8B5CF6" stroke-width="1.3"/>
  <text x="887" y="316" font-family="'Courier New', monospace" font-weight="700" font-size="12" fill="#A78BFA" text-anchor="middle">BIGQUERY</text>
  <rect x="940" y="296" width="76" height="32" rx="16" fill="none" stroke="#6366F1" stroke-width="1.3"/>
  <text x="978" y="316" font-family="'Courier New', monospace" font-weight="700" font-size="12" fill="#818CF8" text-anchor="middle">PYSPARK</text>
  <rect x="1026" y="296" width="90" height="32" rx="16" fill="none" stroke="#A855F7" stroke-width="1.3"/>
  <text x="1071" y="316" font-family="'Courier New', monospace" font-weight="700" font-size="12" fill="#C084FC" text-anchor="middle">DATAPROC</text>
</svg>
