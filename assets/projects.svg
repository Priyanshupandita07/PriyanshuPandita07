<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="pBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0A14"/>
      <stop offset="55%" stop-color="#110F26"/>
      <stop offset="100%" stop-color="#0B0A14"/>
    </linearGradient>
    <linearGradient id="beam" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6D28D9" stop-opacity="0"/>
      <stop offset="50%" stop-color="#6D28D9" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6D28D9" stop-opacity="0"/>
    </linearGradient>
    <pattern id="pgrid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#2A2454" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <rect x="2" y="2" width="1196" height="396" rx="22" fill="url(#pBg)" stroke="url(#pBorder)" stroke-width="2.5"/>
  <rect x="2" y="2" width="1196" height="396" rx="22" fill="url(#pgrid)"/>

  <rect x="2" y="140" width="1196" height="60" fill="url(#beam)">
    <animate attributeName="y" values="140;110;140" dur="6s" repeatCount="indefinite"/>
  </rect>

  <rect x="52" y="44" width="128" height="34" rx="17" fill="#151230" stroke="#4C1D95" stroke-width="1"/>
  <text x="116" y="66" font-family="'Courier New', monospace" font-weight="700" font-size="14" fill="#A78BFA" letter-spacing="2.5" text-anchor="middle">PROJECTS</text>

  <text x="52" y="126" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="40" fill="#FFFFFF">Built and shipped.</text>
  <text x="52" y="158" font-family="Arial, sans-serif" font-weight="600" font-size="17" fill="#8783A8">Production pipelines on GCP — automated, tested, running daily.</text>

  <g>
    <rect x="52" y="192" width="350" height="164" rx="14" fill="#0E0C20" stroke="#8B5CF6" stroke-width="1.3"/>
    <text x="76" y="228" font-family="'Courier New', monospace" font-weight="700" font-size="14" fill="#A78BFA" letter-spacing="2">01 / CHICAGO CRIME</text>
    <text x="76" y="260" font-family="Arial, sans-serif" font-weight="800" font-size="20" fill="#FFFFFF">PySpark ETL Pipeline</text>
    <text x="76" y="290" font-family="Arial, sans-serif" font-weight="600" font-size="13.5" fill="#9B97BC">500K rows · Dataproc · BigQuery</text>
    <text x="76" y="312" font-family="Arial, sans-serif" font-weight="600" font-size="13.5" fill="#9B97BC">Cloud Scheduler · daily automated</text>
    <circle cx="378" cy="216" r="4" fill="#8B5CF6">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g>
    <rect x="426" y="192" width="350" height="164" rx="14" fill="#0E0C20" stroke="#6366F1" stroke-width="1.3"/>
    <text x="450" y="228" font-family="'Courier New', monospace" font-weight="700" font-size="14" fill="#818CF8" letter-spacing="2">02 / PHARMA SALES</text>
    <text x="450" y="260" font-family="Arial, sans-serif" font-weight="800" font-size="20" fill="#FFFFFF">Analytics Pipeline</text>
    <text x="450" y="290" font-family="Arial, sans-serif" font-weight="600" font-size="13.5" fill="#9B97BC">Pandas · Cloud Storage · BigQuery</text>
    <text x="450" y="312" font-family="Arial, sans-serif" font-weight="600" font-size="13.5" fill="#9B97BC">2,106 rows · SQL business insights</text>
    <circle cx="752" cy="216" r="4" fill="#6366F1">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g>
    <rect x="800" y="192" width="350" height="164" rx="14" fill="#0E0C20" stroke="#A855F7" stroke-width="1.3"/>
    <text x="824" y="228" font-family="'Courier New', monospace" font-weight="700" font-size="14" fill="#C084FC" letter-spacing="2">03 / BITEPAY</text>
    <text x="824" y="260" font-family="Arial, sans-serif" font-weight="800" font-size="20" fill="#FFFFFF">B2B SaaS Platform</text>
    <text x="824" y="290" font-family="Arial, sans-serif" font-weight="600" font-size="13.5" fill="#9B97BC">React · JWT · Multi-tenant · REST</text>
    <text x="824" y="312" font-family="Arial, sans-serif" font-weight="600" font-size="13.5" fill="#9B97BC">12,500+ orders · 20 restaurants</text>
    <circle cx="1126" cy="216" r="4" fill="#A855F7">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.6s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
